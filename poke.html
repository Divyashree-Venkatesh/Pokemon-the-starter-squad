<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="pok.css">
    <link rel="icon" href="pokeball1.jpg">
</head>
<body>
    <div class="header-section">
        <h1>CHOOSE YOUR POKEMON FOR TRAINING</h1>
        <p>Click a card to view details</p>
    </div>
    <div class="container">

    <div class="box">
        <a href="#popup1">
            <img src="image1.png" alt="Image 1">
        </a>
    </div>

    <div class="box">
        <a href="#popup2">
            <img src="image2.png" alt="Image 2">
        </a>
    </div>

    <div class="box">
        <a href="#popup3">
            <img src="image3.png" alt="Image 2">
        </a>
    </div>

    <div class="box">

    </div>

    <div class="box">
        <a href="#popup6">
            <img src="image6.png" alt="Image 2">
        </a>
    </div>

    <div class="box">
        <a href="#popup7">
            <img src="image7.png" alt="Image 2">
        </a>
    </div>

</div>


<!-- Popup 1 -->
<div id="popup1" class="popup water-theme">
    <a href="#" class="close">&times;</a>
    <div class="popup-content">
        <img src="image1.png" alt="">
    <p>Pokemon: Piplup💧</p>
    <p>Type: Water</p>
    </div>
</div>

<!-- Popup 2 -->
<div id="popup2" class="popup electric-theme">

    <div class="popup-content">

</div>

</div>

</html>
